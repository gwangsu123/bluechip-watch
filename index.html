<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="블루칩워치">
<meta name="theme-color" content="#0f0f0f">
<title>블루칩 워치</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --line:rgba(255,255,255,0.07);
  --t1:#f0f0f0;--t2:#888;--t3:#444;
  --up:#ff4040;--dn:#3d87f5;--gold:#e8b400;
  --top:env(safe-area-inset-top,44px);
  --bot:env(safe-area-inset-bottom,16px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,'SF Pro Text',sans-serif;overflow:hidden;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100%}
#hd{flex-shrink:0;background:var(--bg);padding:calc(var(--top) + 10px) 16px 0;border-bottom:0.5px solid var(--line)}
.hd-row{display:flex;align-items:center;margin-bottom:10px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.5px;flex:1}
.logo em{color:var(--gold);font-style:normal}
.icon-btn{width:34px;height:34px;border:none;background:var(--bg3);border-radius:50%;color:var(--t2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#searchbox{height:0;overflow:hidden;transition:height .2s}
#searchbox.open{height:44px}
#searchbox input{width:100%;height:38px;background:var(--bg3);border:0.5px solid var(--line);border-radius:10px;padding:0 14px;color:var(--t1);font-size:15px;outline:none;margin-bottom:6px}
#searchbox input::placeholder{color:var(--t3)}
#tabs{flex-shrink:0;display:flex;gap:6px;overflow-x:auto;padding:10px 16px;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;font-size:12px;padding:5px 13px;border-radius:99px;border:0.5px solid rgba(255,255,255,.15);color:var(--t2);background:transparent;cursor:pointer;white-space:nowrap}
.stab.on{background:var(--t1);color:#000;border-color:var(--t1);font-weight:600}
#list{flex:1;overflow-y:auto;padding:0 10px 8px;-webkit-overflow-scrolling:touch}
.sec-hd{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);padding:10px 6px 4px}
.row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;margin-bottom:2px;background:var(--bg2);cursor:pointer}
.row:active{background:var(--bg3)}
.rk{font-size:11px;color:var(--t3);width:24px;text-align:right;flex-shrink:0}
.nm{flex:1;min-width:0}
.nm b{display:block;font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nm s{font-size:11px;color:var(--t3);font-style:normal}
.pct{font-size:13px;font-weight:600;width:58px;text-align:right;flex-shrink:0}
.up{color:var(--up)}.dn{color:var(--dn)}.nt{color:var(--t2)}
.star{font-size:19px;width:28px;text-align:center;flex-shrink:0;color:var(--t3)}
.star.on{color:var(--gold)}
.empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px;line-height:1.8}
#nav{flex-shrink:0;background:var(--bg);border-top:0.5px solid var(--line);padding-bottom:var(--bot);display:flex}
.ntab{flex:1;border:none;background:none;padding:10px 0 6px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--t3)}
.ntab.on{color:var(--gold)}
.ntab i{font-size:23px;line-height:1}
.ntab span{font-size:10px}
.badge{display:inline-block;background:var(--up);color:#fff;font-size:10px;font-weight:700;border-radius:99px;padding:0 5px;min-width:16px;text-align:center;margin-left:3px;vertical-align:middle}

/* 뉴스 패널 */
#news-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);display:none;align-items:flex-end}
#news-overlay.open{display:flex;background:rgba(0,0,0,.65)}
#news-drawer{
  background:var(--bg2);border-radius:20px 20px 0 0;width:100%;
  max-height:75vh;overflow-y:auto;padding-bottom:calc(var(--bot) + 8px);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  -webkit-overflow-scrolling:touch;
}
#news-overlay.open #news-drawer{transform:translateY(0)}
.grip{width:36px;height:4px;background:var(--t3);border-radius:99px;margin:12px auto 0}
.news-hd{display:flex;align-items:center;padding:14px 16px 12px;border-bottom:0.5px solid var(--line)}
.news-hd-name{font-size:16px;font-weight:600;flex:1}
.news-hd-hint{font-size:11px;color:var(--t3);margin-top:2px}
.news-close{border:none;background:var(--bg3);color:var(--t2);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer}
.news-loading,.news-empty{text-align:center;padding:36px 20px;color:var(--t3);font-size:13px;line-height:1.8}
.news-item{display:block;padding:13px 16px;border-bottom:0.5px solid var(--line);text-decoration:none}
.news-item:active{background:var(--bg3)}
.news-src{font-size:11px;color:var(--gold);margin-bottom:4px}
.news-headline{font-size:14px;color:var(--t1);line-height:1.45;margin-bottom:4px}
.news-time{font-size:11px;color:var(--t3)}
.news-more{display:block;text-align:center;padding:15px;font-size:13px;color:var(--t2);text-decoration:none}
.news-more:active{background:var(--bg3)}
</style>
</head>
<body>
<div id="app">
  <div id="hd">
    <div class="hd-row">
      <div class="logo">블루칩 <em>워치</em></div>
      <button class="icon-btn" onclick="toggleSearch()">🔍</button>
    </div>
    <div id="searchbox">
      <input id="srch" type="search" placeholder="종목명 또는 코드 검색…"
        oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>
  <div id="tabs"></div>
  <div id="list"></div>
  <div id="nav">
    <button class="ntab on" id="n-all" onclick="setView('all')"><i>📊</i><span>전체</span></button>
    <button class="ntab" id="n-fav" onclick="setView('fav')"><i>⭐</i><span>즐겨찾기</span></button>
  </div>
</div>

<div id="news-overlay" onclick="overlayTap(event)">
  <div id="news-drawer">
    <div class="grip"></div>
    <div class="news-hd">
      <div>
        <div class="news-hd-name" id="news-nm"></div>
        <div class="news-hd-hint">탭하면 기사로 이동해요</div>
      </div>
      <button class="news-close" onclick="closeNews()">✕</button>
    </div>
    <div id="news-body"></div>
  </div>
</div>

let favs=JSON.parse(localStorage.getItem('bc_favs')||'[]');
let sec='all',view='all',q='',searchOpen=false;
const save=()=>localStorage.setItem('bc_favs',JSON.stringify(favs));

function toggleFav(tk,e){
  e.stopPropagation();
  const i=favs.indexOf(tk);i===-1?favs.push(tk):favs.splice(i,1);
  save();render();
}
function toggleSearch(){
  searchOpen=!searchOpen;
  document.getElementById('searchbox').classList.toggle('open',searchOpen);
  if(searchOpen) document.getElementById('srch').focus();
  else{q='';document.getElementById('srch').value='';render();}
}
function onSearch(v){q=v.trim().toLowerCase();render();}
function setSec(id){sec=id;renderTabs();renderList();}
function setView(v){
  view=v;
  document.getElementById('n-all').className='ntab'+(v==='all'?' on':'');
  document.getElementById('n-fav').className='ntab'+(v==='fav'?' on':'');
  document.getElementById('tabs').style.display=v==='fav'?'none':'flex';
  renderList();
}
function filtered(){
  let s=ST;
  if(view==='fav') s=s.filter(x=>favs.includes(x[1]));
  if(sec!=='all') s=s.filter(x=>x[4]===sec);
  if(q) s=s.filter(x=>x[2].toLowerCase().includes(q)||x[1].includes(q));
  return s.sort((a,b)=>a[0]-b[0]);
}
function renderTabs(){
  document.getElementById('tabs').innerHTML=SEC.map(s=>
    `<button class="stab${s.id===sec?' on':''}" onclick="setSec('${s.id}')">${s.lb}</button>`
  ).join('');
}
function renderList(){
  const el=document.getElementById('list');
  const data=filtered();
  if(!data.length){
    el.innerHTML=`<div class="empty">${view==='fav'?'⭐️<br>즐겨찾기 종목을<br>별표로 추가하세요':'🔍<br>검색 결과가 없어요'}</div>`;
    return;
  }
  if(sec==='all'&&view==='all'&&!q){
    let h='';
    SEC.slice(1).forEach(s=>{
      const ss=data.filter(x=>x[4]===s.id);
      if(!ss.length)return;
      h+=`<div class="sec-hd"><span>${s.lb}</span><span>${ss.length}종목</span></div>`;
      h+=ss.map(rowHtml).join('');
    });
    el.innerHTML=h;
  } else {
    el.innerHTML=data.map(rowHtml).join('');
  }
  const fc=favs.length;
  document.getElementById('n-fav').innerHTML=
    `<i>⭐</i><span>즐겨찾기${fc?`<span class="badge">${fc}</span>`:''}</span>`;
}
function rowHtml([rk,tk,nm,chg,sid,sub]){
  const isFav=favs.includes(tk);
  const s=chg>0?'+':'';
  const c=chg>0?'up':chg<0?'dn':'nt';
  return `<div class="row" onclick="showNews('${tk}','${nm.replace(/'/g,"\\'")}')">
    <span class="rk">${rk}</span>
    <span class="nm"><b>${nm}</b><s>${tk} · ${sub}</s></span>
    <span class="pct ${c}">${s}${chg.toFixed(2)}%</span>
    <span class="star${isFav?' on':''}" onclick="toggleFav('${tk}',event)">${isFav?'★':'☆'}</span>
  </div>`;
}
function render(){renderTabs();renderList();}

/* ── 뉴스 ── */
function fmtTime(str){
  if(!str)return '';
  const d=new Date(str),now=new Date();
  const m=Math.floor((now-d)/60000);
  if(m<1)return '방금';if(m<60)return m+'분 전';
  if(m<1440)return Math.floor(m/60)+'시간 전';
  return Math.floor(m/1440)+'일 전';
}
async function showNews(tk,nm){
  document.getElementById('news-nm').textContent=nm;
  document.getElementById('news-body').innerHTML='<div class="news-loading">⏳ 뉴스 불러오는 중...</div>';
  document.getElementById('news-overlay').classList.add('open');
  try{
    const kw=encodeURIComponent(nm+' 주가');
    const rss=encodeURIComponent(`https://news.google.com/rss/search?q=${kw}&hl=ko&gl=KR&ceid=KR:ko`);
    const res=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rss}&count=6`);
    const data=await res.json();
    if(data.status==='ok'&&data.items&&data.items.length){
      const html=data.items.slice(0,5).map(it=>{
        const src=it.author||'구글뉴스';
        const title=it.title.replace(/\s*-\s*[^-]+$/,'');
        return `<a class="news-item" href="${it.link}" target="_blank" rel="noopener">
          <div class="news-src">${src}</div>
          <div class="news-headline">${title}</div>
          <div class="news-time">${fmtTime(it.pubDate)}</div>
        </a>`;
      }).join('');
      const more=`https://news.google.com/search?q=${kw}&hl=ko&gl=KR`;
      document.getElementById('news-body').innerHTML=
        html+`<a class="news-more" href="${more}" target="_blank" rel="noopener">구글 뉴스에서 더 보기 →</a>`;
    } else {
      document.getElementById('news-body').innerHTML='<div class="news-empty">관련 뉴스를 찾을 수 없어요</div>';
    }
  } catch(e){
    document.getElementById('news-body').innerHTML='<div class="news-empty">뉴스를 불러올 수 없어요<br><small style="color:var(--t3)">인터넷 연결을 확인해주세요</small></div>';
  }
}
function closeNews(){document.getElementById('news-overlay').classList.remove('open');}
function overlayTap(e){if(e.target.id==='news-overlay')closeNews();}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
render();
</script>

</html>
